<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>作业</title>
	</head>
	<body>
		<script>
		function qm(a,b)
			{var sum = a;
			while(sum < b)
				{sum = sum + 1
				if (sum % 3 == 0)
				continue;
				document.write("</br>" + sum)
				}
				}
		var Numbera = prompt("请输入数字a:");
		var Numberb = prompt("请输入数字b:");
		a= Numbera*1;
		b = Numberb*1;
		qm(a,b)
		</script>
	</body>
</html>
