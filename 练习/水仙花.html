		<script>
		function sxh(s)
		{
		a = parseInt(s/100);
		b = parseInt(s/100%10);
		c = (s%10);
		while(s < 1000)
		{s= s + 1
		if(s == a**3 + b**3 + c**3)
		document.write("</br>" + s)
		}
		}
		var i = prompt("请输入数字:");
		//i = parseInt(i);

		document.write(i)
		sxh(i)
		</script>
